<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<style>

body{
    font-family: Arial;
    background: #f5f5f5;
}

.navbar{
    background: white;
    padding: 15px;
}

.container{
    width: 600px;
    margin: auto;
    margin-top: 20px;
}

.card{
    background: white;
    padding: 20px;
}

textarea{
    width: 100%;
    height: 150px;
}

button{
    padding: 10px 20px;
    background: #0095f6;
    border: none;
    color: white;
}

.alert{
    background: #ffe5e5;
    color: red;
    padding: 10px;
    margin-top: 20px;
}

</style>

</head>

<body>

<div class="navbar">

    <a href="/home">Home</a>

    <a href="/profile">Profile</a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <div class="card">

        <h2>Profile Bio</h2>

        <form method="POST">

            <textarea
                name="bio"
                placeholder="Write your bio"></textarea>

            <br><br>

            <button type="submit">
                Save Profile
            </button>

        </form>

        <!-- {% if result %}

        <div class="alert">

            Attack: {{ result.attack }}

            <br>

            Severity: {{ result.severity }}

        </div>

        {% endif %} -->

    </div>

</div>

</body>

</html>
