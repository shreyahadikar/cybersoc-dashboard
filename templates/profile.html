<!DOCTYPE html>
<html>

<head>

<title>Profile</title>

<style>

body{
    font-family: Arial;

    background:
        radial-gradient(circle at top left, rgba(0,255,170,0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.12), transparent 35%),
        #050816;

    margin:0;
    padding:0;

    color:white;

    overflow-x:hidden;
}

/* animated cyber grid */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;

    width:200%;
    height:200%;

    background-image:
        linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);

    background-size:40px 40px;

    transform:rotate(8deg);

    animation:gridMove 18s linear infinite;

    z-index:0;
}

@keyframes gridMove{
    0%{
        transform:translate(0,0) rotate(8deg);
    }

    100%{
        transform:translate(-40px,-40px) rotate(8deg);
    }
}

.navbar{
    background: rgba(10,15,30,0.9);

    padding: 18px 30px;

    border-bottom: 1px solid rgba(0,255,170,0.15);

    position:sticky;
    top:0;

    z-index:10;

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 15px rgba(0,255,170,0.08);
}

.navbar a{
    margin-right: 20px;

    text-decoration: none;

    color: #00ffaa;

    font-weight:bold;

    transition:0.3s;
}

.navbar a:hover{
    color:white;

    text-shadow:
        0 0 10px rgba(0,255,170,0.7);
}

.container{
    width: 600px;

    margin: auto;

    margin-top: 40px;

    position:relative;
    z-index:2;
}

.card{
    background: rgba(10,15,30,0.88);

    padding: 25px;

    border-radius: 16px;

    border:1px solid rgba(0,255,170,0.15);

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 20px rgba(0,255,170,0.08),
        0 0 40px rgba(0,140,255,0.05);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 25px rgba(0,255,170,0.15),
        0 0 45px rgba(0,140,255,0.10);
}

.card h2{
    color:#00ffaa;

    margin-top:0;

    letter-spacing:1px;

    text-shadow:
        0 0 10px rgba(0,255,170,0.4);
}

textarea{
    width: 100%;

    height: 150px;

    padding:12px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,0.12);

    background:rgba(255,255,255,0.05);

    color:white;

    resize:none;

    outline:none;

    transition:0.3s;
}

textarea::placeholder{
    color:#90a4b8;
}

textarea:focus{
    border-color:#00ffaa;

    box-shadow:
        0 0 12px rgba(0,255,170,0.3);

    background:rgba(255,255,255,0.07);
}

button{
    padding: 10px 20px;

    background: linear-gradient(
        135deg,
        #00ffaa,
        #008cff
    );

    border: none;

    color: white;

    border-radius:10px;

    font-weight:bold;

    letter-spacing:0.5px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 18px rgba(0,255,170,0.4),
        0 0 30px rgba(0,140,255,0.2);
}

.alert{
    background: rgba(255,0,0,0.10);

    color: #ff5a5a;

    padding: 12px;

    margin-top: 20px;

    border-radius:10px;

    border:1px solid rgba(255,0,0,0.25);

    box-shadow:
        0 0 12px rgba(255,0,80,0.12);
}

</style>

</head>

<body>

<div class="navbar">

    <a href="/home">Home</a>

    <a href="/profile">Profile</a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <div class="card">

        <h2>Profile Bio</h2>

        <form method="POST">

            <textarea
                name="bio"
                placeholder="Write your bio"></textarea>

            <br><br>

            <button type="submit">
                Save Profile
            </button>

        </form>

        <!-- {% if result %}

        <div class="alert">

            Attack: {{ result.attack }}

            <br>

            Severity: {{ result.severity }}

        </div>

        {% endif %} -->

    </div>

</div>

</body>

</html>
