<!DOCTYPE html>
<html>
<head>

    <title>CyberSOC Dashboard</title>
    <style>

@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Rajdhani',sans-serif;

    background:
    radial-gradient(circle at top left,#00f7ff22,transparent 25%),
    radial-gradient(circle at bottom right,#ff00ff22,transparent 25%),
    linear-gradient(135deg,#020617,#07111f,#0f172a);

    color:white;

    min-height:100vh;

    overflow-x:hidden;
}

/* ===================================================
HEADER
=================================================== */

.header{

    position:sticky;
    top:0;
    z-index:100;

    height:80px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 35px;

    font-size:30px;
    font-weight:700;

    font-family:'Orbitron',sans-serif;

    letter-spacing:2px;

    background:rgba(5,10,20,0.85);

    backdrop-filter:blur(15px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    box-shadow:0 0 30px rgba(0,255,255,0.1);

    color:#ffffff;

    text-shadow:
    0 0 8px #00e5ff,
    0 0 18px #00e5ff;
}

.header::after{

    content:"";

    position:absolute;

    left:0;
    bottom:0;

    width:100%;
    height:2px;

    background:linear-gradient(
        90deg,
        #00e5ff,
        #7c3aed,
        #ff0080,
        #00e5ff
    );

    background-size:300%;

    animation:lineMove 6s linear infinite;
}

@keyframes lineMove{

    0%{
        background-position:0%;
    }

    100%{
        background-position:300%;
    }
}

.live-status{

    display:flex;
    align-items:center;
    gap:10px;

    font-size:15px;
}

.live-dot{

    width:12px;
    height:12px;

    border-radius:50%;

    background:#00ff95;

    box-shadow:
    0 0 12px #00ff95,
    0 0 20px #00ff95;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.4);
    }

    100%{
        transform:scale(1);
    }
}

/* ===================================================
CONTAINER
=================================================== */

.container{

    padding:30px;
}

/* ===================================================
CARDS
=================================================== */

.cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));

    gap:25px;

    margin-bottom:30px;
}

.card{

    position:relative;

    overflow:hidden;

    background:rgba(15,23,42,0.65);

    border:1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(16px);

    border-radius:24px;

    padding:28px;

    transition:0.35s ease;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.4),
    inset 0 1px 1px rgba(255,255,255,0.04);
}

.card::before{

    content:"";

    position:absolute;

    top:-100px;
    right:-100px;

    width:220px;
    height:220px;

    background:radial-gradient(
        circle,
        rgba(0,229,255,0.25),
        transparent 70%
    );
}

.card:hover{

    transform:translateY(-8px) scale(1.02);

    border:1px solid rgba(0,229,255,0.45);

    box-shadow:
    0 20px 40px rgba(0,229,255,0.15),
    0 0 25px rgba(124,58,237,0.15);
}

.card p{

    color:#94a3b8;

    font-size:16px;

    text-transform:uppercase;

    letter-spacing:1px;

    margin-bottom:14px;
}

.card h2{

    font-size:48px;

    font-weight:700;

    font-family:'Orbitron',sans-serif;

    color:white;

    text-shadow:
    0 0 12px rgba(0,229,255,0.6);
}

/* ===================================================
THREAT PANEL
=================================================== */

.threat-panel{

    margin-bottom:30px;

    background:rgba(15,23,42,0.7);

    border-radius:24px;

    padding:25px;

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.35);
}

.threat-level{

    margin-top:18px;

    height:18px;

    border-radius:20px;

    overflow:hidden;

    background:#111827;
}

.threat-fill{

    height:100%;

    width:20%;

    border-radius:20px;

    background:linear-gradient(
        90deg,
        #00ff95,
        #ffb020,
        #ff3b3b
    );

    animation:threatMove 4s infinite alternate;
}

@keyframes threatMove{

    0%{
        width:20%;
    }

    100%{
        width:85%;
    }
}

/* ===================================================
CHARTS
=================================================== */

.charts{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:25px;

    margin-bottom:35px;
}

.chart-box{

    height:420px;

    position:relative;

    overflow:hidden;

    background:rgba(15,23,42,0.7);

    border-radius:25px;

    padding:25px;

    border:1px solid rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    box-shadow:
    0 12px 35px rgba(0,0,0,0.35);

    transition:0.3s ease;
}

.chart-box:hover{

    transform:translateY(-5px);

    border:1px solid rgba(255,0,128,0.35);

    box-shadow:
    0 18px 40px rgba(255,0,128,0.12);
}

.chart-box::after{

    content:"";

    position:absolute;

    inset:0;

    background:
    radial-gradient(circle at 20% 20%,#00e5ff22,transparent 30%),
    radial-gradient(circle at 80% 80%,#ff008022,transparent 30%);

    animation:floatingGlow 6s ease infinite alternate;

    pointer-events:none;
}

@keyframes floatingGlow{

    0%{
        transform:translateY(0px);
    }

    100%{
        transform:translateY(-12px);
    }
}

/* ===================================================
TIMELINE
=================================================== */

.timeline{

    margin-bottom:30px;

    background:rgba(15,23,42,0.75);

    border-radius:24px;

    padding:25px;

    border:1px solid rgba(255,255,255,0.08);
}

.timeline-item{

    display:flex;

    align-items:center;

    gap:20px;

    padding:14px 0;

    border-bottom:1px solid rgba(255,255,255,0.06);
}

.timeline-dot{

    width:14px;
    height:14px;

    border-radius:50%;

    background:#00e5ff;

    box-shadow:
    0 0 12px #00e5ff;
}

/* ===================================================
TABLE
=================================================== */

h2{

    margin-bottom:18px;

    font-size:26px;

    font-weight:700;

    color:white;

    text-shadow:0 0 10px rgba(0,229,255,0.3);
}

table{

    width:100%;

    border-collapse:collapse;

    overflow:hidden;

    border-radius:22px;

    background:rgba(15,23,42,0.75);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.06);

    box-shadow:
    0 12px 35px rgba(0,0,0,0.35);
}

thead{

    background:linear-gradient(
        90deg,
        rgba(0,229,255,0.15),
        rgba(124,58,237,0.15)
    );
}

th{

    padding:18px;

    text-align:left;

    color:#cbd5e1;

    font-size:14px;

    text-transform:uppercase;

    letter-spacing:1px;
}

td{

    padding:16px 18px;

    border-bottom:1px solid rgba(255,255,255,0.04);

    font-size:15px;
}

tbody tr:hover{

    background:rgba(0,229,255,0.08);
}

/* ===================================================
SEVERITY
=================================================== */

.CRITICAL{

    color:#ff3b3b;

    font-weight:700;

    text-shadow:
    0 0 10px rgba(255,59,59,0.7);
}

.HIGH{

    color:#ffb020;

    font-weight:700;

    text-shadow:
    0 0 10px rgba(255,176,32,0.6);
}

.LOW{

    color:#00ff95;

    font-weight:700;

    text-shadow:
    0 0 10px rgba(0,255,149,0.5);
}


/* ===================================================
DEEPFAKE FILE INPUT STYLING
=================================================== */

.file-upload-wrapper{

    margin-top:20px;

    position:relative;

    width:100%;
}

.file-upload-wrapper input[type="file"]{

    display:none;
}

.custom-file-upload{

    width:100%;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:14px;

    padding:22px;

    border-radius:22px;

    cursor:pointer;

    transition:0.35s ease;

    border:2px dashed rgba(0,229,255,0.35);

    background:
    linear-gradient(
        135deg,
        rgba(0,229,255,0.08),
        rgba(124,58,237,0.08),
        rgba(255,0,128,0.08)
    );

    backdrop-filter:blur(10px);

    box-shadow:
    inset 0 0 25px rgba(0,229,255,0.06),
    0 0 20px rgba(0,0,0,0.25);

    overflow:hidden;

    position:relative;
}

.custom-file-upload::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.08),
        transparent
    );

    transform:translateX(-100%);

    transition:0.7s;
}

.custom-file-upload:hover::before{

    transform:translateX(100%);
}

.custom-file-upload:hover{

    transform:translateY(-4px) scale(1.01);

    border:2px dashed #00e5ff;

    box-shadow:
    0 0 30px rgba(0,229,255,0.28),
    0 0 60px rgba(124,58,237,0.18);
}

.upload-icon{

    font-size:34px;

    filter:drop-shadow(
        0 0 10px rgba(0,229,255,0.7)
    );
}

.upload-text{

    display:flex;

    flex-direction:column;
}

.upload-title{

    font-size:18px;

    font-weight:700;

    color:#ffffff;

    letter-spacing:1px;
}

.upload-subtitle{

    margin-top:4px;

    font-size:13px;

    color:#94a3b8;
}

.selected-file{

    margin-top:12px;

    color:#00ff95;

    font-size:14px;

    text-align:center;

    text-shadow:
    0 0 10px rgba(0,255,149,0.45);
}

/* ===================================================
RESPONSIVE
=================================================== */

@media(max-width:1000px){

    .charts{

        grid-template-columns:1fr;
    }
}

.result-area{

    margin-top:25px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;
}

#previewImage{

    max-width:320px;
    max-height:320px;

    border-radius:18px;

    display:none;

    margin-bottom:18px;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:0 0 25px rgba(0,229,255,0.25);
}

#deepfakeResult{

    font-size:22px;
    font-weight:700;
}

/* button styling (move inline CSS here) */
.scan-btn{

    margin-top:20px;
    padding:14px 24px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#7c3aed,#00e5ff);

    color:white;

    font-size:15px;
    font-weight:700;
    letter-spacing:1px;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 0 20px rgba(124,58,237,0.35);
}

.scan-btn:hover{

    transform:scale(1.05);
}

.button-area{

    margin-top:20px;

    display:flex;
    justify-content:center;
}

.back-area{

    margin-bottom:15px;

    display:flex;
    justify-content:flex-start;
}

.back-btn{

    padding:10px 18px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:14px;

    letter-spacing:1px;

    color:white;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(10px);

    transition:0.3s ease;

    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.back-btn:hover{

    transform:translateX(-4px);

    border:1px solid rgba(0,229,255,0.4);

    box-shadow:0 0 20px rgba(0,229,255,0.25);
}

@media(max-width:768px){

    .header{

        font-size:20px;

        padding:0 20px;
    }

    .container{

        padding:18px;
    }

    .cards{

        grid-template-columns:1fr;
    }
}

</style>

</head>
<body>  
<div class="card">

    <h2>Deepfake Image Detection</h2>

    <div class="file-upload-wrapper">

        <label for="deepfakeImage" class="custom-file-upload">

            <div class="upload-icon">🛡️</div>

            <div class="upload-text">

                <div class="upload-title">
                    Choose Image For AI Scan
                </div>

                <div class="upload-subtitle">
                    JPG, PNG, JPEG supported
                </div>

            </div>

        </label>

        <input
            type="file"
            id="deepfakeImage"
            accept="image/*"
            onchange="showFileName()"
        >

        <div id="selectedFile" class="selected-file">
            No image selected
        </div>

    </div>

    <!-- CENTER AREA -->
    <div class="result-area">

        <img id="previewImage" />

        <h3 id="deepfakeResult"></h3>

    </div>

    <div class="button-area">
    <button onclick="scanDeepfake()" class="scan-btn">
        SCAN IMAGE
    </button>
</div>

<div class="back-area">
    <button class="back-btn" onclick="history.back()">
        ⬅ BACK
    </button>
</div>
</div>

<script>
    function showFileName(){

    const input = document.getElementById("deepfakeImage");
    const fileText = document.getElementById("selectedFile");
    const preview = document.getElementById("previewImage");

    if(input.files.length > 0){

        const file = input.files[0];

        fileText.innerHTML = "Selected: " + file.name;

        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
        };

        reader.readAsDataURL(file);

    } else {

        fileText.innerHTML = "No image selected";
        preview.style.display = "none";
    }
}

async function scanDeepfake(){

    const fileInput =
        document.getElementById(
            "deepfakeImage"
        );

    const file = fileInput.files[0];

    if(!file){

        alert("Select image");

        return;
    }

    const formData = new FormData();

    formData.append(
        "image",
        file
    );

    const response = await fetch(

        "/deepfake_predict",

        {

            method:"POST",

            body:formData
        }
    );

    const data = await response.json();

    document.getElementById(
        "deepfakeResult"
    ).innerHTML = `

        Detection:
        <span class="${data.severity}">
            ${data.attack}
        </span>

    `;
}

</script>
</body>
</html>
