<!DOCTYPE html>
<html>

<head>

    <title>LOGIN</title>

    <style>

        body{
            font-family: Arial;
            background:
                radial-gradient(circle at top left, rgba(0,255,170,0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(0,140,255,0.14), transparent 35%),
                #050816;

            min-height:100vh;
            overflow:hidden;
            position:relative;
        }

        /* animated cyber grid */

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:200%;
            height:200%;

            background-image:
                linear-gradient(rgba(0,255,170,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,170,0.05) 1px, transparent 1px);

            background-size:40px 40px;

            transform:rotate(8deg);

            animation:gridMove 18s linear infinite;
        }

        @keyframes gridMove{
            0%{
                transform:translate(0,0) rotate(8deg);
            }

            100%{
                transform:translate(-40px,-40px) rotate(8deg);
            }
        }

        .container{
            width: 350px;
            margin: 100px auto;

            background: rgba(10,15,30,0.88);

            padding: 30px;

            border: 1px solid rgba(0,255,170,0.25);

            text-align: center;

            border-radius:18px;

            backdrop-filter:blur(12px);

            position:relative;
            z-index:2;

            box-shadow:
                0 0 20px rgba(0,255,170,0.18),
                0 0 45px rgba(0,140,255,0.12);
        }

        .container::before{
            content:"";
            position:absolute;
            inset:0;

            border-radius:18px;
            padding:1px;

            background:linear-gradient(
                135deg,
                rgba(0,255,170,0.8),
                rgba(0,140,255,0.6),
                rgba(0,255,170,0.8)
            );

            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);

            -webkit-mask-composite:xor;
            mask-composite:exclude;

            pointer-events:none;
        }

        h1{
            color:#00ffaa;

            letter-spacing:4px;

            margin-bottom:20px;

            text-shadow:
                0 0 12px rgba(0,255,170,0.6);
        }

        input{
            width: 90%;
            padding: 12px;

            margin: 10px 0;

            border-radius:10px;

            border:1px solid rgba(255,255,255,0.12);

            background:rgba(255,255,255,0.05);

            color:white;

            outline:none;

            transition:0.3s;
        }

        input::placeholder{
            color:#93a4b8;
        }

        input:focus{
            border-color:#00ffaa;

            box-shadow:
                0 0 10px rgba(0,255,170,0.35);

            background:rgba(255,255,255,0.08);
        }

        button{
            width: 95%;
            padding: 12px;

            background: linear-gradient(
                135deg,
                #00ffaa,
                #008cff
            );

            color: white;

            border: none;

            border-radius:10px;

            font-weight:bold;

            letter-spacing:1px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);

            box-shadow:
                0 0 18px rgba(0,255,170,0.45),
                0 0 30px rgba(0,140,255,0.25);
        }

        .alert{

            margin-top:20px;
            padding:12px 14px;

            background:rgba(255,0,0,0.08);
            border:1px solid rgba(255,0,0,0.3);

            color:#ff4d4d;

            border-radius:10px;

            font-weight:600;
            letter-spacing:0.5px;

            text-align:center;

            box-shadow:
                0 0 12px rgba(255,0,80,0.18);
        }

    </style>

</head>

<body>

<div class="container">

    <h1>BLOG</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <!-- {% if result %}

    <div class="alert">

        {{ result.attack }}

        <br>

        Severity: {{ result.severity }}

        {% if result.attempts %}

            <br>

            Attempts: {{ result.attempts }}

        {% endif %}

    </div>

    {% endif %} -->
{% if result %}
    <div class="alert">
        Invalid login. Please try again.
    </div>
{% endif %}
</div>

</body>
</html>
