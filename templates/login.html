<!DOCTYPE html>
<html>

<head>

    <title>LOGIN</title>

    <style>

        body{
            font-family: Arial;
            background: #fafafa;
        }

        .container{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            text-align: center;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 10px 0;
        }

        button{
            width: 95%;
            padding: 12px;
            background: #0095f6;
            color: white;
            border: none;
        }

        .alert{

    margin-top:20px;
    padding:12px 14px;

    background:rgba(255,0,0,0.08);
    border:1px solid rgba(255,0,0,0.3);

    color:#ff4d4d;

    border-radius:10px;

    font-weight:600;
    letter-spacing:0.5px;

    text-align:center;
}

    </style>

</head>

<body>

<div class="container">

    <h1>BLOG</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <!-- {% if result %}

    <div class="alert">

        {{ result.attack }}

        <br>

        Severity: {{ result.severity }}

        {% if result.attempts %}

            <br>

            Attempts: {{ result.attempts }}

        {% endif %}

    </div>

    {% endif %} -->
{% if result %}
    <div class="alert">
        Invalid login. Please try again.
    </div>
{% endif %}
</div>

</body>
</html>
