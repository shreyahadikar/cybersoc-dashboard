<!DOCTYPE html>
<html>

<head>

<title>CyberGram</title>

<style>

body{
    font-family: Arial;

    background:
        radial-gradient(circle at top left, rgba(0,255,170,0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.12), transparent 35%),
        #050816;

    margin:0;
    padding:0;

    color:white;

    overflow-x:hidden;
}

/* animated cyber grid */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;

    width:200%;
    height:200%;

    background-image:
        linear-gradient(rgba(0,255,170,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.04) 1px, transparent 1px);

    background-size:40px 40px;

    transform:rotate(8deg);

    animation:gridMove 18s linear infinite;

    z-index:0;
}

@keyframes gridMove{
    0%{
        transform:translate(0,0) rotate(8deg);
    }

    100%{
        transform:translate(-40px,-40px) rotate(8deg);
    }
}

.navbar{
    background: rgba(10,15,30,0.9);

    padding: 18px 30px;

    border-bottom: 1px solid rgba(0,255,170,0.15);

    position:sticky;
    top:0;

    z-index:10;

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 15px rgba(0,255,170,0.08);
}

.navbar a{
    margin-right: 20px;

    text-decoration: none;

    color: #00ffaa;

    font-weight:bold;

    transition:0.3s;
}

.navbar a:hover{
    color:white;

    text-shadow:
        0 0 10px rgba(0,255,170,0.7);
}

.container{
    width: 700px;

    margin: auto;

    margin-top: 30px;

    position:relative;
    z-index:2;
}

.card{
    background: rgba(10,15,30,0.88);

    padding: 20px;

    margin-bottom: 20px;

    border-radius: 14px;

    border:1px solid rgba(0,255,170,0.15);

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 20px rgba(0,255,170,0.08),
        0 0 40px rgba(0,140,255,0.05);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 25px rgba(0,255,170,0.15),
        0 0 45px rgba(0,140,255,0.10);
}

.card h2,
.card h3{
    color:#00ffaa;

    margin-top:0;

    text-shadow:
        0 0 10px rgba(0,255,170,0.4);
}

.card p{
    color:#d7e1ec;

    line-height:1.6;
}

textarea{
    width: 100%;

    height: 100px;

    padding: 12px;

    border-radius:10px;

    border:1px solid rgba(255,255,255,0.12);

    background:rgba(255,255,255,0.05);

    color:white;

    resize:none;

    outline:none;

    transition:0.3s;
}

textarea::placeholder{
    color:#90a4b8;
}

textarea:focus{
    border-color:#00ffaa;

    box-shadow:
        0 0 12px rgba(0,255,170,0.3);

    background:rgba(255,255,255,0.07);
}

input[type="text"]{
    width: 80%;

    padding: 10px;

    border-radius:10px;

    border:1px solid rgba(255,255,255,0.12);

    background:rgba(255,255,255,0.05);

    color:white;

    outline:none;

    transition:0.3s;
}

input[type="text"]::placeholder{
    color:#90a4b8;
}

input[type="text"]:focus{
    border-color:#00ffaa;

    box-shadow:
        0 0 10px rgba(0,255,170,0.25);

    background:rgba(255,255,255,0.07);
}

button{
    padding: 10px 20px;

    background: linear-gradient(
        135deg,
        #00ffaa,
        #008cff
    );

    border: none;

    color: white;

    cursor: pointer;

    border-radius:10px;

    font-weight:bold;

    letter-spacing:0.5px;

    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 18px rgba(0,255,170,0.4),
        0 0 30px rgba(0,140,255,0.2);
}

.alert{
    background: rgba(255,0,0,0.10);

    color: #ff5a5a;

    padding: 12px;

    margin-bottom: 20px;

    border-radius:10px;

    border:1px solid rgba(255,0,0,0.25);

    box-shadow:
        0 0 12px rgba(255,0,80,0.12);
}

.comment{
    margin-top: 10px;

    padding: 12px;

    background: rgba(255,255,255,0.05);

    border-radius:10px;

    border-left:3px solid #00ffaa;

    color:#dce6f1;

    backdrop-filter:blur(6px);

    box-shadow:
        0 0 10px rgba(0,255,170,0.06);
}

strong{
    color:#00ffaa;
}

</style>

</head>

<body>

<div class="navbar">

    <a href="/home">Home</a>

    <a href="/profile">Profile</a>

    <a href="/logout">Logout</a>

</div>

<div class="container">

    <!-- {% if result %}

    <div class="alert">

        <strong>Attack:</strong>

        {{ result.attack }}

        <br>

        <strong>Severity:</strong>

        {{ result.severity }}

    </div>

    {% endif %} -->



    <!-- CREATE POST -->

    <div class="card">

        <h2>Create Post</h2>

        <form method="POST" action="/home">

            <textarea
                name="post"
                placeholder="What's happening?"
                required></textarea>

            <br><br>

            <button type="submit">
                Post
            </button>

        </form>

    </div>

    <!-- POSTS -->

    {% for post in posts %}

    <div class="card">

        <h3>@admin</h3>

        <p>{{ post }}</p>

        <!-- COMMENT -->

        <form method="POST" action="/comment">

            <input type="text"
                   name="comment"
                   placeholder="Write comment"
                   required>

            <button type="submit">
                Comment
            </button>

        </form>

    </div>

    {% endfor %}

    <!-- COMMENTS -->

    {% for comment in comments %}

    <div class="comment">

        <strong>Comment:</strong>

        {{ comment }}

    </div>

    {% endfor %}

</div>

</body>

</html>
